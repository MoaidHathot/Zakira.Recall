name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\Zakira.Recall.slnx

      - name: Build
        run: dotnet build .\Zakira.Recall.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test .\Zakira.Recall.slnx --configuration Release --no-build
